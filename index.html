<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Atlas | Ultra-Realistic Moon Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <canvas id="lunar-canvas"></canvas>
        <!-- Control Overlay -->
        <div class="controls-overlay">
            <button id="atlas-toggle" class="btn-primary">
                <span class="status-indicator"></span>
                ATLAS MODE: <span id="atlas-status">OFF</span>
            </button>
        </div>

        <!-- Minimalist Status Overlay -->
        <div class="overlay-minimal">
            <div class="coord-item">LAT: <span id="lat-display">--.---°</span></div>
            <div class="coord-item">LNG: <span id="lng-display">--.---°</span></div>
        </div>

        <div class="loading-overlay" id="loading-overlay">
            <div class="loader"></div>
            <p>STREAMING NASA MISSION MAP...</p>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
