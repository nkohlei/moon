<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Atlas | Ultra-Realistic Moon Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <canvas id="lunar-canvas"></canvas>
        <!-- Control Overlay -->
        <div class="controls-overlay">
            <button id="atlas-toggle" class="btn-primary">
                <span class="status-indicator"></span>
                ATLAS MODE: <span id="atlas-status">OFF</span>
            </button>
        </div>

        <!-- Minimalist Status Overlay -->
        <div class="overlay-minimal">
            <div class="coord-item">LAT: <span id="lat-display">--.---°</span></div>
            <div class="coord-item">LNG: <span id="lng-display">--.---°</span></div>
        </div>

        <!-- Mission Selection Sidebar -->
        <div id="sites-sidebar" class="sidebar-glass">
            <div class="sidebar-header">
                <h3>MISSION LOG</h3>
                <p>EXPLORATION SITES</p>
            </div>
            <div id="sites-list" class="sites-list">
                <!-- Points will be injected here via main.js -->
            </div>
        </div>

        <!-- Mission Details Panel -->
        <div id="info-panel" class="info-glass">
            <button id="close-info" class="close-btn">&times;</button>
            <div class="info-content">
                <header>
                    <h2 id="info-title">MISSION NAME</h2>
                    <div class="meta-row">
                        <span id="info-year">YEAR</span>
                        <span class="separator">|</span>
                        <span id="info-operator">OPERATOR</span>
                    </div>
                </header>
                <div class="info-body">
                    <p id="info-description">Description goes here...</p>
                    <div class="details-box">
                        <h4>KEY OBJECTIVES</h4>
                        <p id="info-details">More details...</p>
                    </div>
                </div>
                <button id="fly-to-btn" class="btn-secondary">FLY TO SITE</button>
            </div>
        </div>

        <div class="loading-overlay" id="loading-overlay">
            <div class="loader"></div>
            <p>STREAMING NASA MISSION MAP...</p>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
